[package]
name = "tidymedia"
version = "1.1.4"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
camino = { version = "*", features = ["serde1"] }
clap = { version = "*", features = ["derive"] }
fs_extra = "*"
generic-array = "0"
hex = "*"
ignore = "*"
memmap2 = "*"
parking_lot = "*"
rayon = "*"
serde = "*"
serde_derive = "*"
serde_json = "*"
serde_yaml = "*"
sha2 = "*"
tempfile = "*"
thiserror = "*"
time = "*"
tracing = "*"
tracing-subscriber = { version = "*", features = ["env-filter"] }
wyhash = "*"
xxhash-rust = { version = "*", features = ["xxh3"] }

[dev-dependencies]
assert_cmd = "*"
filetime = "*"
predicates = "*"
pretty_assertions = "*"
rstest = "*"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage_nightly)'] }
