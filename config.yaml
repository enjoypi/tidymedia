# tidymedia 运行配置
# 加载顺序：默认值 -> 当前文件 -> 环境变量覆盖
# Secret 通过 ${VAR:-default} 语法从环境变量加载；本项目目前无 secret
copy:
  # 输出目录按 年/月 分桶时使用的时区，单位：整小时（北京时间默认 +8）
  timezone_offset_hours: ${TIDYMEDIA_TIMEZONE_OFFSET_HOURS:-8}
  # 目标文件命中重名时尝试 file_stem_<i>.<ext> 的最大次数
  unique_name_max_attempts: ${TIDYMEDIA_UNIQUE_NAME_MAX_ATTEMPTS:-10}
exif:
  # EXIF 时间戳小于此 UNIX 秒数视为不可信（默认 2000-01-01T00:00:00Z）
  valid_date_time_secs: ${TIDYMEDIA_VALID_DATE_TIME_SECS:-946684800}
# Backend Gateway 全局开关：仅放非凭据可调项；
# SMB 密码经 SMB_PASSWORD env、Kerberos 走 KRB5CCNAME，均不入 yaml
backend:
  smb:
    # URI 未写 `user@` 时兜底用户名；真实 client 接入后由 SmbBackend 读取
    default_user: ${SMB_USER:-}
    # NTLM 工作组；pavao SmbCredentials::workgroup 必填
    workgroup: ${SMB_WORKGROUP:-WORKGROUP}
    # 单次 SMB 操作超时秒数；当前 pavao 无显式 timeout API，仅作配置占位
    timeout_secs: ${TIDYMEDIA_SMB_TIMEOUT_SECS:-30}
  mtp:
    # 设备 / 存储匹配策略：`exact` 或 `fuzzy`，fuzzy 由 client 自决（通常走 contains）
    device_match: ${TIDYMEDIA_MTP_DEVICE_MATCH:-fuzzy}
    storage_match: ${TIDYMEDIA_MTP_STORAGE_MATCH:-fuzzy}
