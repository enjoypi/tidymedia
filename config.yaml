# 加载顺序：默认值 -> 当前文件 -> 环境变量覆盖
# Secret 通过 ${VAR:-default} 语法从环境变量加载；本项目目前无 secret
copy:
  # 输出目录按 年/月 分桶时使用的时区，单位：整小时（北京时间默认 +8）
  timezone_offset_hours: ${TIDYMEDIA_TIMEZONE_OFFSET_HOURS:-8}
  # 目标文件命中重名时尝试 file_stem_<i>.<ext> 的最大次数
  unique_name_max_attempts: ${TIDYMEDIA_UNIQUE_NAME_MAX_ATTEMPTS:-10}
  # 归档目录模板；占位符：{year} {month} {day} {make} {model} {valuable_name}
  # {valuable_name} = 路径中第一个含非 ASCII 的目录段（无则省略此段）
  # 注意：值展开后以 `{` 开头，必须加引号否则 YAML 按 flow mapping 解析
  archive_template: "${TIDYMEDIA_ARCHIVE_TEMPLATE:-{year}/{month}/{valuable_name}}"
exif:
  # EXIF 时间戳小于此 UNIX 秒数视为不可信（默认 2000-01-01T00:00:00Z）
  valid_date_time_secs: ${TIDYMEDIA_VALID_DATE_TIME_SECS:-946684800}
log:
  # 默认日志级别：trace/debug/info/warn/error；优先级 RUST_LOG > --log-level > 此处
  level: ${TIDYMEDIA_LOG_LEVEL:-info}
# Backend Gateway 全局开关：仅放非凭据可调项；
# SMB 密码经 SMB_PASSWORD env、Kerberos 走 KRB5CCNAME，均不入 yaml
# 注：timeout_secs（smb/adb）与 mtp.{device_match,storage_match} 已删——依赖库无
# timeout API、MTP real client 是 stub，占位字段只制造"配置了却无效"的幻觉；
# 旧 yaml 含这些键不会报错（serde 忽略未知字段）
backend:
  smb:
    # URI 未写 `user@` 时兜底用户名；真实 client 接入后由 SmbBackend 读取
    default_user: ${SMB_USER:-}
    # NTLM 工作组；pavao SmbCredentials::workgroup 必填
    workgroup: ${SMB_WORKGROUP:-WORKGROUP}
  adb:
    # 本机 adb daemon 监听地址；adb_client 通过 TCP 连接此端口
    server_host: ${TIDYMEDIA_ADB_SERVER_HOST:-127.0.0.1}
    # adb daemon 默认端口；多个 adb 实例并存时按需调整
    server_port: ${TIDYMEDIA_ADB_SERVER_PORT:-5037}
