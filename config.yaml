# 加载顺序：默认值 -> 当前文件 -> 环境变量覆盖
# Secret 通过 ${VAR:-default} 语法从环境变量加载；本项目目前无 secret
copy:
  # 输出目录按 年/月 分桶时使用的时区，单位：整小时（北京时间默认 +8）
  timezone_offset_hours: ${TIDYMEDIA_TIMEZONE_OFFSET_HOURS:-8}
  # 目标文件命中重名时尝试 file_stem_<i>.<ext> 的最大次数
  unique_name_max_attempts: ${TIDYMEDIA_UNIQUE_NAME_MAX_ATTEMPTS:-10}
  # 归档目录模板；占位符：{year} {month} {day} {make} {model} {valuable_name}
  # {valuable_name} = 路径中第一个含非 ASCII 的目录段（无则省略此段）
  # 注意：值展开后以 `{` 开头，必须加引号否则 YAML 按 flow mapping 解析
  archive_template: "${TIDYMEDIA_ARCHIVE_TEMPLATE:-{year}/{month}/{valuable_name}}"
exif:
  # EXIF 时间戳小于此 UNIX 秒数视为不可信（默认 2000-01-01T00:00:00Z）
  valid_date_time_secs: ${TIDYMEDIA_VALID_DATE_TIME_SECS:-946684800}
log:
  # 默认日志级别：trace/debug/info/warn/error；优先级 RUST_LOG > --log-level > 此处
  level: ${TIDYMEDIA_LOG_LEVEL:-info}
# Backend Gateway 全局开关：仅放非凭据可调项；
# SMB 密码经 SMB_PASSWORD env、Kerberos 走 KRB5CCNAME，均不入 yaml
# 注：timeout_secs（smb/adb）与 mtp.{device_match,storage_match} 已删——依赖库无
# timeout API、MTP real client 是 stub，占位字段只制造"配置了却无效"的幻觉；
# 旧 yaml 含这些键不会报错（serde 忽略未知字段）
backend:
  smb:
    # URI 未写 `user@` 时兜底用户名；真实 client 接入后由 SmbBackend 读取
    default_user: ${SMB_USER:-}
    # NTLM 工作组；pavao SmbCredentials::workgroup 必填
    workgroup: ${SMB_WORKGROUP:-WORKGROUP}
  adb:
    # 本机 adb daemon 监听地址；adb_client 通过 TCP 连接此端口
    server_host: ${TIDYMEDIA_ADB_SERVER_HOST:-127.0.0.1}
    # adb daemon 默认端口；多个 adb 实例并存时按需调整
    server_port: ${TIDYMEDIA_ADB_SERVER_PORT:-5037}
  # move-text-shot 子命令的文本检测后端
  # 仅在使用该子命令时读取；其余路径不消费这些字段
  ocr:
    # PaddleOCR DBNet det.onnx 模型本地路径；空 = 调用时报 InvalidInput
    # 模型文件不入 git，运行前由用户自备并指定路径
    det_model_path: ${TIDYMEDIA_OCR_DET_MODEL:-}
    # sigmoid 输出图二值化阈值（DBNet 训练惯用 0.3）
    binarize_threshold: ${TIDYMEDIA_OCR_THRESHOLD:-0.3}
    # 二值化后前景像素占比下限；高于此值判含文本
    min_text_pixel_ratio: ${TIDYMEDIA_OCR_MIN_RATIO:-0.005}
    # 推理前 resize 的短边像素上限；实际按 32 倍数对齐
    resize_max_side: ${TIDYMEDIA_OCR_MAX_SIDE:-736}
  # cull 子命令的人脸质量评分后端
  # 4 个 ONNX 模型路径 + pHash/清晰度/EAR 阈值 + 综合评分权重
  # 模型走 git-lfs 存放在 models/，clone 后 `git lfs pull` 拉取；
  # 任一路径为空 = 调用时报 InvalidInput
  face:
    # SCRFD-10G-bn-kps（人脸 bbox + 5 点关键点；antelopev2 默认变体）
    scrfd_model_path: ${TIDYMEDIA_FACE_SCRFD_MODEL:-models/scrfd_10g_bnkps.onnx}
    # SCRFD anchor 置信度阈值（光线差/合影密集脸场景可调低到 0.3）
    scrfd_score_threshold: ${TIDYMEDIA_FACE_SCRFD_SCORE:-0.5}
    # SCRFD 非极大值抑制 IoU 阈值（密集脸场景调 0.3 增强去重）
    scrfd_nms_iou: ${TIDYMEDIA_FACE_SCRFD_NMS_IOU:-0.4}
    # MobileFaceNet（112×112 → 128 维 embedding；foamliu/MobileFaceNet 训练规格）
    facenet_model_path: ${TIDYMEDIA_FACE_FACENET_MODEL:-models/mobilefacenet.onnx}
    # MediaPipe FaceMesh（468 点 3D 关键点；PINTO_model_zoo 192×192 静态版）
    facemesh_model_path: ${TIDYMEDIA_FACE_FACEMESH_MODEL:-models/face_mesh_192x192.onnx}
    # YOLOv8 EyeState（眼部开/闭检测；MichalMlodawski/open-closed-eye-detection）
    eyestate_model_path: ${TIDYMEDIA_FACE_EYESTATE_MODEL:-models/eyestate_yolov8.onnx}
    # pHash 汉明距离阈值；≤ 此值的两图视为相似入同组
    phash_hamming_max: ${TIDYMEDIA_FACE_PHASH_MAX:-10}
    # 全图 Laplacian 方差下限；低于此值视整图模糊丢弃（单图组例外保留）
    sharpness_min: ${TIDYMEDIA_FACE_SHARPNESS_MIN:-100.0}
    # 跨图人脸 embedding 余弦相似度阈值；≥ 此值判同一身份
    face_cosine_min: ${TIDYMEDIA_FACE_COSINE_MIN:-0.5}
    # EAR（眼睑纵横比）阈值；低于此值视为闭眼
    ear_blink_max: ${TIDYMEDIA_FACE_EAR_MAX:-0.21}
    # EyeState 模型闭眼概率阈值
    eye_blink_score_max: ${TIDYMEDIA_FACE_BLINK_SCORE:-0.5}
    # 眼部 crop 半径相对人脸 bbox 高度的比例（儿童/老人/宽镜头可调 0.12~0.15）
    eye_crop_radius_ratio: ${TIDYMEDIA_FACE_EYE_CROP_RATIO:-0.10}
    # 综合评分中清晰度权重
    w_sharpness: ${TIDYMEDIA_FACE_W_SHARPNESS:-1.0}
    # 综合评分中闭眼惩罚权重
    w_blink: ${TIDYMEDIA_FACE_W_BLINK:-2.0}
    # 综合评分中微笑加分权重
    w_smile: ${TIDYMEDIA_FACE_W_SMILE:-0.5}
    # 单文件字节上限（防 OOM）；超此值的图扫描阶段直接 skip 计入 failed
    # 默认 50 MiB = 52428800 字节；大 RAW 文件可调高
    max_image_bytes: ${TIDYMEDIA_FACE_MAX_BYTES:-52428800}
